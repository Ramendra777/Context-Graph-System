services:
  - type: web
    name: o2c-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && export PYTHONPATH=. && python backend/scripts/ingest.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .

staticSites:
  - name: o2c-frontend
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://o2c-backend.onrender.com