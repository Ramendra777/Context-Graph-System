services:
  # 1. Backend Web Service
  - type: web
    name: o2c-backend
    env: python
    buildCommand: pip install -r requirements.txt && python backend/scripts/ingest.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .

  # 2. Frontend (Static Site)
  - type: web
    name: o2c-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://o2c-backend.onrender.com
